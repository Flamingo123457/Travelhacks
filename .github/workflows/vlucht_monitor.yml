name: ✈️ Vluchtdeal Monitor

on:
  schedule:
    - cron: '*/8 * * * *'    # elke 8 minuten (publieke repo = onbeperkt gratis)
  workflow_dispatch:           # ook handmatig starten via GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20        # 12 bestemmingen × ~1 min = ~12 min; 20 geeft marge

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependencies installeren
        run: pip install requests

      - name: Één ronde draaien
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/vlucht_monitor_once.py
